  <title id="title">Brandkaart logo</title>
  <desc id="desc">Oranje-rood schild met een witte vlam, zonder achtergrond.</desc>
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6a00"/>
      <stop offset="0.58" stop-color="#ff3b10"/>
      <stop offset="1" stop-color="#e91824"/>
    </linearGradient>
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3a1a"/>
      <stop offset="1" stop-color="#c90f1d"/>
    </linearGradient>
    <linearGradient id="ember" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff9a2e"/>
      <stop offset="1" stop-color="#ff4b12"/>
